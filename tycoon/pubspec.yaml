name: tycoon
description: "Tycoon mobile — native home and email sign-in."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/env/app.env
    - assets/images/hero_bg.png
    - assets/images/howItWorksBg1.png
    - assets/images/howItWorksBg2.png
    - assets/images/howItWorksBg3.png
    - assets/images/howItWorksBg4.png
    - assets/images/footer_logo.png
